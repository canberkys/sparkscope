<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="hex" width="14" height="16" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <polygon points="7,1 13,5 13,12 7,16 1,12 1,5"
               fill="none" stroke="#334155" stroke-width="0.7" opacity="0.55"/>
    </pattern>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Device body -->
  <rect x="4" y="6" width="192" height="68" rx="8" ry="8" fill="url(#bodyGrad)" stroke="#475569" stroke-width="1"/>

  <!-- Hexagonal mesh front panel -->
  <rect x="10" y="12" width="180" height="48" rx="4" ry="4" fill="url(#hex)"/>
  <rect x="10" y="12" width="180" height="48" rx="4" ry="4" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Status LED strip -->
  <circle cx="16" cy="68" r="1.3" fill="#22d3ee" opacity="0.9"/>
  <circle cx="22" cy="68" r="1.3" fill="#475569" opacity="0.5"/>

  <!-- Accent glow line at bottom (animation suggestion) -->
  <rect x="10" y="66" width="180" height="1" fill="url(#accentGlow)" opacity="0.7"/>
</svg>
