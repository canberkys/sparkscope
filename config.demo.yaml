# Demo mode config — used when DEMO_MODE=1 (or demo_mode: true below).
# No SSH connections are made; MockCollector generates realistic synthetic metrics.
demo_mode: true

hosts:
  neo:
    ssh_alias: neo
    display_name: "Neo (Upper)"
    management_ip: "10.0.0.10"
    cluster_ip: "192.168.100.10"
    cluster_peer_ip: "192.168.100.11"
  trinity:
    ssh_alias: trinity
    display_name: "Trinity (Lower)"
    management_ip: "10.0.0.11"
    cluster_ip: "192.168.100.11"
    cluster_peer_ip: "192.168.100.10"

polling:
  interval_seconds: 2
  timeout_seconds: 5
  max_retries: 3
  reconnect_backoff_seconds: [1, 2, 5, 10, 30]

database:
  # Ephemeral path — demo data won't persist between deploys
  path: "/tmp/gb10-dashboard-demo/metrics.db"
  raw_retention_hours: 2
  vacuum_interval_hours: 24

server:
  host: "0.0.0.0"   # Public binding for hosted demo
  port: 7860        # HuggingFace Spaces default
  log_level: "info"

security:
  allow_custom_commands: false
  command_confirmation_required: true

thresholds:
  cpu_temp_warning: 75
  cpu_temp_critical: 85
  gpu_temp_warning: 80
  gpu_temp_critical: 90
  gpu_power_warning: 200
  disk_usage_warning: 80
  disk_usage_critical: 95
  memory_usage_warning: 90
  network_error_rate_warning: 100

ui:
  refresh_hint_seconds: 2
  chart_history_minutes: 10
  theme: "auto"
